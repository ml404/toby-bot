<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" role="img" aria-label="TobyBot mascot">
  <!-- Soft glow behind the robot — picks up --accent at low alpha. -->
  <defs>
    <radialGradient id="mascot-glow" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#5865F2" stop-opacity="0.35"/>
      <stop offset="60%" stop-color="#5865F2" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#5865F2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mascot-stroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7289fa"/>
      <stop offset="100%" stop-color="#5865F2"/>
    </linearGradient>
  </defs>

  <circle cx="110" cy="105" r="100" fill="url(#mascot-glow)"/>

  <!-- Antenna -->
  <line x1="110" y1="44" x2="110" y2="20" stroke="url(#mascot-stroke)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="110" cy="16" r="6" fill="#7289fa"/>

  <!-- Head -->
  <rect x="62" y="44" width="96" height="84" rx="16" fill="none" stroke="url(#mascot-stroke)" stroke-width="5"/>
  <!-- Eyes -->
  <circle cx="88" cy="80" r="9" fill="#7289fa"/>
  <circle cx="132" cy="80" r="9" fill="#7289fa"/>
  <!-- Mouth -->
  <rect x="86" y="104" width="48" height="7" rx="3.5" fill="#7289fa" opacity="0.75"/>

  <!-- Body -->
  <rect x="70" y="138" width="80" height="50" rx="10" fill="none" stroke="url(#mascot-stroke)" stroke-width="4" opacity="0.7"/>
  <!-- Arms -->
  <line x1="70" y1="156" x2="44" y2="168" stroke="url(#mascot-stroke)" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="150" y1="156" x2="176" y2="168" stroke="url(#mascot-stroke)" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
</svg>
