<!DOCTYPE html>
<!--
    Shared page layout for the "pick a server to do X" landing pages —
    duel, tip, lottery, poker, blackjack. Each used to inline the same
    head / navbar / heading / alerts / guild-card grid / empty-hero
    scaffold with only emoji, title, description, and the action
    button URL varying. Two fragments cover the two card shapes:

    - singleAction: one button per card. Used by /duel/guilds,
      /tip/guilds, /lottery/guilds, /poker/guilds.
    - dualAction: two buttons per card. Used by /blackjack/guilds
      for solo vs. multi-table.

    Pages that need richer card bodies (casino-guilds with grouped
    game lists, profile/titles/economy with whole-card-link + stat
    slots, excuse-guilds with search) stay as-is — pushing them
    through this fragment would add too many conditionals here.

    Each fragment is on an `<html>` element so the caller's
    `<html th:replace="~{... :: name(...)}">` swaps in the whole
    document.
-->
<html xmlns:th="http://www.thymeleaf.org" lang="en"
      th:fragment="singleAction(pageTitle, cssPath, emoji, headingTitle, description,
                                 actionHref, actionLabel,
                                 emptyEmoji, emptyHeading, emptyBody)">
<head th:replace="~{fragments/head :: head(${pageTitle}, ${cssPath})}"></head>
<body>
<a href="#main" class="skip-link">Skip to content</a>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main id="main" class="container">
    <h1 class="mb-3" th:text="${emoji} + ' ' + ${headingTitle}">Title</h1>
    <p class="muted mb-5" th:text="${description}">Description</p>

    <div th:replace="~{fragments/alerts :: error}"></div>

    <div class="lb-guild-grid" th:if="${not #lists.isEmpty(guilds)}">
        <div class="lb-guild-card lb-guild-card-static" th:each="g : ${guilds}">
            <div th:replace="~{fragments/guildCard :: header(${g})}"></div>
            <div class="lb-guild-top">
                <span class="muted">Your wallet:</span>
                <span th:text="${g.credits} + ' credits'">0 credits</span>
            </div>
            <div class="lb-guild-games">
                <a class="btn-secondary"
                   th:href="@{${actionHref}(id=${g.id})}"
                   th:text="${actionLabel}">Play</a>
            </div>
        </div>
    </div>

    <div class="empty-hero" th:if="${#lists.isEmpty(guilds)}">
        <span class="emoji" aria-hidden="true" th:text="${emptyEmoji}">·</span>
        <h2 th:text="${emptyHeading}">No servers</h2>
        <p class="mb-5" th:text="${emptyBody}">You need to share a server with TobyBot.</p>
    </div>
</main>
</body>
</html>

<html xmlns:th="http://www.thymeleaf.org" lang="en"
      th:fragment="dualAction(pageTitle, cssPath, emoji, headingTitle, description,
                               primaryHref, primaryLabel, secondaryHref, secondaryLabel,
                               emptyEmoji, emptyHeading, emptyBody)">
<head th:replace="~{fragments/head :: head(${pageTitle}, ${cssPath})}"></head>
<body>
<a href="#main" class="skip-link">Skip to content</a>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main id="main" class="container">
    <h1 class="mb-3" th:text="${emoji} + ' ' + ${headingTitle}">Title</h1>
    <p class="muted mb-5" th:text="${description}">Description</p>

    <div th:replace="~{fragments/alerts :: error}"></div>

    <div class="lb-guild-grid" th:if="${not #lists.isEmpty(guilds)}">
        <div class="lb-guild-card lb-guild-card-static" th:each="g : ${guilds}">
            <div th:replace="~{fragments/guildCard :: header(${g})}"></div>
            <div class="lb-guild-top">
                <span class="muted">Your wallet:</span>
                <span th:text="${g.credits} + ' credits'">0 credits</span>
            </div>
            <div class="lb-guild-games">
                <a class="btn-secondary"
                   th:href="@{${primaryHref}(id=${g.id})}"
                   th:text="${primaryLabel}">Solo</a>
                <a class="btn-secondary"
                   th:href="@{${secondaryHref}(id=${g.id})}"
                   th:text="${secondaryLabel}">Multi</a>
            </div>
        </div>
    </div>

    <div class="empty-hero" th:if="${#lists.isEmpty(guilds)}">
        <span class="emoji" aria-hidden="true" th:text="${emptyEmoji}">·</span>
        <h2 th:text="${emptyHeading}">No servers</h2>
        <p class="mb-5" th:text="${emptyBody}">You need to share a server with TobyBot.</p>
    </div>
</main>
</body>
</html>
