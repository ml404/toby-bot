<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TobyBot - Login</title>
    <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 48px 40px;
            text-align: center;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        h1 { font-size: 1.8rem; margin-bottom: 8px; color: #fff; }
        p { color: #a0a0b0; margin-bottom: 32px; }
        .btn-discord {
            display: inline-block;
            background: #5865F2;
            color: #fff;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            transition: background 0.2s;
        }
        .btn-discord:hover { background: #4752c4; }
        .error {
            background: #4a1a1a;
            border: 1px solid #c0392b;
            color: #e74c3c;
            padding: 10px 16px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="card">
    <h1>TobyBot</h1>
    <p>Manage your Discord server intro songs.</p>

    <div th:if="${loginError}" class="error">
        Login failed. Please try again.
    </div>

    <a href="/oauth2/authorization/discord" class="btn-discord">
        Login with Discord
    </a>
</div>
</body>
</html>
