<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('TobyBot - Moderate a Server', '/css/guild-picker.css')}"></head>
<body>
<a href="#main" class="skip-link">Skip to content</a>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main id="main" class="container">
    <h1 class="mb-3">Moderate a Server</h1>
    <p class="muted mb-5">
        Servers where you are the owner or a TobyBot superuser.
    </p>

    <div th:replace="~{fragments/alerts :: error}"></div>

    <div class="guild-grid" th:if="${not #lists.isEmpty(guilds)}" data-reveal>
        <div class="guild-card-wrap" th:each="guild : ${guilds}">
            <a class="guild-card"
               th:href="@{/moderation/{id}(id=${guild.id})}">
                <img th:if="${guild.iconUrl != null}"
                     th:src="${guild.iconUrl}"
                     th:alt="${guild.name} + ' icon'"
                     class="guild-icon"
                     onerror="this.style.display='none'">
                <div th:unless="${guild.iconUrl != null}"
                     class="guild-icon-placeholder"
                     aria-hidden="true"
                     th:text="${#strings.substring(guild.name, 0, 1).toUpperCase()}">G</div>
                <div class="guild-name" th:text="${guild.name}" th:title="${guild.name}">Guild Name</div>
            </a>
            <div th:replace="~{fragments/defaultGuildStar :: star(${guild.id}, ${defaultGuildId}, '/moderation/guilds?pick=true')}"></div>
        </div>
    </div>

    <div class="empty-hero" th:if="${#lists.isEmpty(guilds)}">
        <span class="emoji" aria-hidden="true">🛡️</span>
        <h2>You're not a moderator anywhere yet</h2>
        <p class="mb-5">
            You need to be either the server owner or a TobyBot superuser on a
            server that TobyBot has joined.
        </p>
        <a th:href="${inviteUrl}" class="btn" target="_blank" rel="noopener">Invite TobyBot</a>
    </div>
</main>

<script th:src="@{/js/home.js}"></script>
<footer th:replace="~{fragments/footer :: footer}"></footer>
</body>
</html>
