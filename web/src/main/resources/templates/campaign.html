<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head th:replace="~{fragments/head :: head('TobyBot - D&amp;D Campaigns', '/css/campaign.css')}"></head>
<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<div class="container">
    <h1>⚔️ D&amp;D Campaigns</h1>
    <p class="subtitle">Servers where both you and TobyBot are present.</p>

    <div class="hint">
        Start a campaign in Discord with <code>/campaign create</code> — then manage it here.
    </div>

    <div th:if="${error}" class="error" th:text="${error}"></div>

    <div class="guild-grid" th:if="${not #lists.isEmpty(guilds)}">
        <a class="guild-card"
           th:each="guild : ${guilds}"
           th:href="@{/dnd/campaign/{id}(id=${guild.id})}">
            <img th:if="${guild.iconUrl != null}"
                 th:src="${guild.iconUrl}"
                 th:alt="${guild.name}"
                 class="guild-icon">
            <div th:unless="${guild.iconUrl != null}"
                 class="guild-icon-placeholder"
                 th:text="${#strings.substring(guild.name, 0, 1).toUpperCase()}">G</div>
            <div class="guild-name" th:text="${guild.name}">Guild Name</div>
            <span th:if="${guild.activeCampaign != null}"
                  class="campaign-badge active"
                  th:text="'⚔️ ' + ${guild.activeCampaign.name}">Active Campaign</span>
            <span th:unless="${guild.activeCampaign != null}"
                  class="campaign-badge none">No active campaign</span>
        </a>
    </div>

    <div class="empty" th:if="${#lists.isEmpty(guilds)}">
        <p>You are not in any servers where TobyBot is active.</p>
    </div>
</div>
<script th:src="@{/js/home.js}"></script>
</body>
</html>
