import org.jetbrains.kotlin.gradle.dsl.JvmTarget
import org.jetbrains.kotlin.gradle.tasks.KotlinCompile

buildscript {
    ext {
        springBootVersion = '3.3.4'
        springDependencyManagementVersion = '1.1.7'
        jdaVersion = '6.3.1'
        kotlin_version = '2.3.0'
        kotlinx_version = '1.10.2'
        ktor_version = '2.3.12'
        mockk_version = '1.13.13'
        lavaplayer_version = '2.2.6'
        youtube_common_version = '1.18.0'
    }
    repositories {
        mavenCentral()
    }
    dependencies {
        classpath "org.springframework.boot:spring-boot-gradle-plugin:${springBootVersion}"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
        classpath "org.jetbrains.kotlin:kotlin-allopen:$kotlin_version"
        classpath "org.openrewrite:plugin:6.27.1"
    }
}

plugins {
    id 'io.spring.dependency-management' version "$springDependencyManagementVersion"
    id 'com.autonomousapps.dependency-analysis' version '3.6.1'
}

apply plugin: 'kotlin'

allprojects {
    group = "com.github.ml404"
    version = "6.1-SNAPSHOT"

    ext['kotlin.version'] = kotlin_version

    repositories {
        mavenCentral()
        maven { url = 'https://jitpack.io' }
        maven { url = "https://repo.spring.io/libs-snapshot" }
        maven { url = 'https://repo.spring.io/milestone' }
        maven { url = 'https://repo.spring.io/snapshot' }
        maven { name = 'm2-dv8tion'; url = 'https://m2.dv8tion.net/releases' }
        maven {
            name = 'm2-duncte123'
            url = 'https://m2.duncte123.dev/releases'
        }
        maven { url = "https://maven.lavalink.dev/releases" }
        maven { url = "https://maven.lavalink.dev/snapshots" }
    }
}

subprojects {
    apply plugin: 'io.spring.dependency-management'

    configurations {
        configureEach {
            exclude group: 'org.springframework.boot', module: 'spring-boot-starter-logging'
        }
    }

    tasks.withType(KotlinCompile).configureEach {
        compilerOptions {
            jvmTarget.set(JvmTarget.JVM_22)
        }
    }

    plugins.withId('java') {
        dependencies {
            testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
        }

        tasks.withType(Test).configureEach {
            failOnNoDiscoveredTests = false
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
}

tasks.withType(KotlinCompile).configureEach {
    compilerOptions {
        jvmTarget.set(JvmTarget.JVM_22)
    }
}
repositories {
    mavenCentral()
}

kotlin {
    jvmToolchain(22)
}
