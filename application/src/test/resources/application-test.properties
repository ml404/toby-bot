# Datasource is provided by the @ServiceConnection-bound PostgreSQLContainer
# in TestDatabaseConfig; Spring Boot's auto-configuration fills in the URL,
# username, password, driver, and dialect from the container at runtime.
# No schema.sql, no H2 — Flyway runs the same V*.sql files prod runs against
# the same engine prod runs.
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true

# data.sql still seeds rows AFTER Flyway runs (Spring orders sql.init after
# Flyway). Required by tests that rely on the seed data (config rows,
# brothers, etc.).
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data.sql
logging.level.org.springframework=DEBUG

# Discord OAuth2 stubs (required by HomeController @Value injection)
spring.security.oauth2.client.registration.discord.client-id=test-client-id
spring.security.oauth2.client.registration.discord.client-secret=test-client-secret
