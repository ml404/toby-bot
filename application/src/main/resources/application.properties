spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
server.port=8080
server.servlet.context-path=/
server.forward-headers-strategy=framework
# Keep Location headers relative on sendRedirect (Tomcat default is an
# absolute URL on the canonical host). Inside the Discord Activity
# iframe the page lives on <client-id>.discordsays.com; an absolute
# redirect to www.toby-bot.co.uk is a navigation out of the sandbox and
# Discord kills the activity ("tried to open a disallowed web page").
# Relative Locations resolve against whichever host served the page, so
# the same redirect works on both the dashboard and the activity.
server.tomcat.use-relative-redirects=true

# Actuator: pin web exposure to the health probe only. This is Spring
# Boot's default today, but stating it explicitly means a stray
# MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE env var (or a future Boot
# default change) can't silently publish /actuator/env or /actuator/heapdump.
# WebSecurityConfig deliberately leaves only /actuator/health
# unauthenticated for platform health checks.
management.endpoints.web.exposure.include=health
spring.cache.type=caffeine
spring.profiles.active=prod
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP — sized for a 512 MB dyno. Tomcat thread max is 10 (below),
# so a 10-connection pool is oversized; four covers web + scheduled work
# without queueing. Idle/max-lifetime let the pool shed connections
# during quiet periods, releasing JDBC driver buffers + statement caches.
spring.datasource.hikari.maximum-pool-size=4
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=600000

# Reddit app-only OAuth for the /meme command (issue #107). When unset, /meme
# falls back to the (now Reddit-blocked) unauthenticated endpoint.
reddit.client-id=${REDDIT_CLIENT_ID:}
reddit.client-secret=${REDDIT_CLIENT_SECRET:}

# Discord OAuth2
spring.security.oauth2.client.registration.discord.client-id=${DISCORD_CLIENT_ID}
spring.security.oauth2.client.registration.discord.client-secret=${DISCORD_CLIENT_SECRET}
spring.security.oauth2.client.registration.discord.scope=identify,guilds
spring.security.oauth2.client.registration.discord.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.discord.redirect-uri={baseUrl}/login/oauth2/code/discord
spring.security.oauth2.client.provider.discord.authorization-uri=https://discord.com/api/oauth2/authorize
spring.security.oauth2.client.provider.discord.token-uri=https://discord.com/api/oauth2/token
spring.security.oauth2.client.provider.discord.user-info-uri=https://discord.com/api/users/@me
spring.security.oauth2.client.provider.discord.user-name-attribute=id

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Tomcat thread pool
server.tomcat.threads.max=10
server.tomcat.threads.min-spare=2

app.base-url=${APP_BASE_URL:}

# Bot operator(s) — comma-separated Discord user ids allowed to see the
# operator-only /admin surface (e.g. /admin/installs). Absent/blank means
# the page is denied to everyone and its navbar link stays hidden
# (fail-closed). Parsed by web.service.BotOwnerAuthorizer.
bot.owner-ids=${BOT_OWNER_IDS:}

# Multipart limits for intro uploads
spring.servlet.multipart.max-file-size=600KB
spring.servlet.multipart.max-request-size=600KB

# Web Push (RFC 8292) VAPID keys are picked up via Spring's relaxed-binding
# of env vars: TOBY_VAPID_PUBLIC_KEY → toby.vapid.public-key etc. No
# explicit property declaration on purpose — when env is unset the
# property is *absent* (not empty), so VapidProperties'
# @ConditionalOnProperty doesn't match → WebPushAdapter bean isn't
# registered → NotificationRouter falls back to its one-shot no-op WARN.
# Dev/CI environments without keys keep working with zero config.