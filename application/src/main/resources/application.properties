spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=none
server.port=8080
server.servlet.context-path=/
server.forward-headers-strategy=framework
spring.cache.type=caffeine
spring.profiles.active=prod
spring.datasource.driver-class-name=org.postgresql.Driver

# Discord OAuth2
spring.security.oauth2.client.registration.discord.client-id=${DISCORD_CLIENT_ID}
spring.security.oauth2.client.registration.discord.client-secret=${DISCORD_CLIENT_SECRET}
spring.security.oauth2.client.registration.discord.scope=identify,guilds
spring.security.oauth2.client.registration.discord.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.discord.redirect-uri={baseUrl}/login/oauth2/code/discord
spring.security.oauth2.client.provider.discord.authorization-uri=https://discord.com/api/oauth2/authorize
spring.security.oauth2.client.provider.discord.token-uri=https://discord.com/api/oauth2/token
spring.security.oauth2.client.provider.discord.user-info-uri=https://discord.com/api/users/@me
spring.security.oauth2.client.provider.discord.user-name-attribute=id

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# Tomcat thread pool
server.tomcat.threads.max=10
server.tomcat.threads.min-spare=2

app.base-url=${APP_BASE_URL:}

# Multipart limits for intro uploads
spring.servlet.multipart.max-file-size=600KB
spring.servlet.multipart.max-request-size=600KB

# Web Push (RFC 8292) VAPID keys. When unset the WebPushAdapter bean
# is not registered (see VapidProperties + WebPushAdapter conditionals)
# and NotificationRouter.sendPush falls back to its no-op + one-shot
# WARN. Set TOBY_VAPID_PUBLIC_KEY + TOBY_VAPID_PRIVATE_KEY to enable
# real push delivery; TOBY_VAPID_SUBJECT defaults to a placeholder
# mailto and should be set to the operator's contact in production.
toby.vapid.public-key=${TOBY_VAPID_PUBLIC_KEY:}
toby.vapid.private-key=${TOBY_VAPID_PRIVATE_KEY:}
toby.vapid.subject=${TOBY_VAPID_SUBJECT:mailto:admin@example.invalid}